name: Release to Modal

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: "How far the deploy proceeds; staging-only stops before any production job"
        required: true
        default: full
        type: choice
        options:
          - full
          - staging-only
      new_app_target:
        description: "Where to deploy the newly built worker app"
        required: true
        default: frontier
        type: choice
        options:
          - frontier
          - current
          - both
          - none
      promote_existing_frontier:
        description: "Move the existing frontier worker to current before deploying a new frontier"
        required: true
        default: true
        type: boolean
      cleanup_target:
        description: "Modal app group to stop after updating the manifest"
        required: true
        default: retired
        type: choice
        options:
          - none
          - retired
          - frontier
          - current

env:
  GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT || 'policyengine-household-api' }}
  HOUSEHOLD_CLOUD_RUN_REGION: ${{ vars.HOUSEHOLD_CLOUD_RUN_REGION || 'us-central1' }}
  HOUSEHOLD_FAILOVER_MANIFEST_BUCKET: ${{ vars.HOUSEHOLD_FAILOVER_MANIFEST_BUCKET || 'policyengine-household-api-release-manifests' }}
  MODAL_WORKSPACE: policyengine
  PYTHON_VERSION: "3.13"

concurrency:
  group: household-api-modal-release
  cancel-in-progress: false

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: make install

      - name: Run Ruff format check
        run: make format-check

      - name: Run tests without auth
        run: make test

      - name: Run tests with auth
        run: make test-with-auth
        env:
          AUTH__ENABLED: true
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_TEST_TOKEN_NO_DOMAIN: ${{ secrets.AUTH0_TEST_TOKEN_NO_DOMAIN }}
          AUTH0_TEST_TOKEN_SCOPES: ${{ secrets.AUTH0_TEST_TOKEN_SCOPES }}

  resolve-modal-release-config:
    name: Resolve Modal release config
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
      source: ${{ steps.resolve.outputs.source }}
      deploy_mode: ${{ steps.resolve.outputs.deploy_mode }}
      new_app_target: ${{ steps.resolve.outputs.new_app_target }}
      promote_existing_frontier: ${{ steps.resolve.outputs.promote_existing_frontier }}
      cleanup_target: ${{ steps.resolve.outputs.cleanup_target }}
      config_json: ${{ steps.resolve.outputs.config_json }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Resolve Modal release config
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python .github/scripts/resolve_modal_release_config.py \
            --output-json modal-release-config.json

  migrate-analytics-db-staging:
    name: Migrate analytics database (staging)
    runs-on: ubuntu-latest
    needs: [lint-and-test, resolve-modal-release-config]
    if: needs.resolve-modal-release-config.outputs.should_deploy == 'true'
    environment: staging
    permissions:
      contents: read
    env:
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud for analytics database
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Run analytics database migrations
        run: uv run alembic -c projects/analytics-api/alembic.ini upgrade head

  deploy-analytics-staging:
    name: Deploy Cloud Run analytics writer to staging
    runs-on: ubuntu-latest
    needs: [migrate-analytics-db-staging]
    environment: staging
    permissions:
      contents: read
    outputs:
      analytics_writer_url: ${{ steps.deploy.outputs.analytics_writer_url }}
    env:
      MODAL_ENVIRONMENT: staging
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Deploy Cloud Run analytics writer
        id: deploy
        env:
          APP__ENVIRONMENT: staging
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED }}
          OBSERVABILITY_LOG_RAW_IP: ${{ vars.OBSERVABILITY_LOG_RAW_IP }}
          OBSERVABILITY_REQUEST_LOGS_ENABLED: ${{ vars.OBSERVABILITY_REQUEST_LOGS_ENABLED }}
          HOUSEHOLD_CLOUD_RUN_ANALYTICS_WRITER_SERVICE_ACCOUNT: ${{ vars.HOUSEHOLD_CLOUD_RUN_ANALYTICS_WRITER_SERVICE_ACCOUNT }}
        run: bash .github/scripts/cloud-run-deploy-analytics.sh

  deploy-modal-staging:
    name: Deploy Modal release to staging
    runs-on: ubuntu-latest
    needs: [resolve-modal-release-config, migrate-analytics-db-staging]
    environment: staging
    permissions:
      contents: read
    env:
      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud for analytics database
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Ensure Modal staging environment exists
        run: uv run modal environment create staging 2>/dev/null || true

      - name: Deploy Modal app set
        id: deploy
        env:
          APP__ENVIRONMENT: staging
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED }}
          OBSERVABILITY_LOG_RAW_IP: ${{ vars.OBSERVABILITY_LOG_RAW_IP }}
          OBSERVABILITY_REQUEST_LOGS_ENABLED: ${{ vars.OBSERVABILITY_REQUEST_LOGS_ENABLED }}
          AUTH__ENABLED: "true"
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
          ANALYTICS__CLOUD_TASKS__PROJECT: ${{ vars.ANALYTICS_CLOUD_TASKS_PROJECT || env.GOOGLE_CLOUD_PROJECT }}
          ANALYTICS__CLOUD_TASKS__LOCATION: ${{ vars.ANALYTICS_CLOUD_TASKS_LOCATION || env.HOUSEHOLD_CLOUD_RUN_REGION }}
          ANALYTICS__CLOUD_TASKS__QUEUE: ${{ vars.ANALYTICS_CLOUD_TASKS_QUEUE }}
          ANALYTICS__CLOUD_TASKS__TARGET_URL: ${{ vars.ANALYTICS_CLOUD_TASKS_TARGET_URL }}
          ANALYTICS__CLOUD_TASKS__SERVICE_ACCOUNT_EMAIL: ${{ vars.ANALYTICS_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL }}
          ANALYTICS__CLOUD_TASKS__OIDC_AUDIENCE: ${{ vars.ANALYTICS_CLOUD_TASKS_OIDC_AUDIENCE }}
          ANALYTICS__CLOUD_TASKS__DISPATCH_DEADLINE_SECONDS: ${{ vars.ANALYTICS_CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS }}
          # Defer stopping retired Modal apps until cleanup-modal-staging runs,
          # after the Cloud Run failover manifest has been refreshed.
          HOUSEHOLD_DEFER_MODAL_CLEANUP: "true"
        run: |
          bash .github/scripts/modal-deploy-release.sh \
            '${{ needs.resolve-modal-release-config.outputs.config_json }}' \
            '${{ needs.resolve-modal-release-config.outputs.deploy_mode }}'

      - name: Upload deferred Modal cleanup manifest
        uses: actions/upload-artifact@v7
        with:
          name: modal-cleanup-staging
          path: modal-cleanup.json
          if-no-files-found: ignore

  integration-tests-staging:
    name: Integration tests against Modal staging (${{ matrix.channel }}, ${{ matrix.route_mode }})
    runs-on: ubuntu-latest
    # These tests assert analytics rows appear, so the analytics writer must
    # already be deployed when they run — not racing them in a sibling job.
    needs: [deploy-modal-staging, deploy-analytics-staging]
    environment: staging
    env:
      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        channel: [current, frontier]
        route_mode: [channel, exact]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Fetch Auth0 test token
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_SECRET }}
          AUTH0_TEST_TOKEN_SCOPES: ${{ secrets.AUTH0_TEST_TOKEN_SCOPES }}
        run: python .github/scripts/fetch_auth0_test_token.py

      - name: Run deployed integration tests for route
        run: |
          bash .github/scripts/run-deployed-tests-for-modal-route.sh \
            "${{ matrix.channel }}" \
            "${{ matrix.route_mode }}"

  deploy-cloud-run-staging:
    name: Deploy Cloud Run failover to staging
    runs-on: ubuntu-latest
    needs: [deploy-modal-staging, deploy-analytics-staging]
    environment: staging
    permissions:
      contents: read
    outputs:
      gateway_url: ${{ steps.deploy.outputs.gateway_url }}
      manifest_uri: ${{ steps.deploy.outputs.manifest_uri }}
    env:
      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Deploy Cloud Run failover services
        id: deploy
        env:
          APP__ENVIRONMENT: staging
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED }}
          OBSERVABILITY_LOG_RAW_IP: ${{ vars.OBSERVABILITY_LOG_RAW_IP }}
          OBSERVABILITY_REQUEST_LOGS_ENABLED: ${{ vars.OBSERVABILITY_REQUEST_LOGS_ENABLED }}
          AUTH__ENABLED: "true"
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          HOUSEHOLD_CLOUD_RUN_GATEWAY_SERVICE_ACCOUNT: ${{ vars.HOUSEHOLD_CLOUD_RUN_GATEWAY_SERVICE_ACCOUNT }}
          HOUSEHOLD_CLOUD_RUN_GATEWAY_INGRESS: ${{ vars.HOUSEHOLD_CLOUD_RUN_GATEWAY_INGRESS }}
          HOUSEHOLD_CLOUD_RUN_GATEWAY_PUBLIC_URL: ${{ vars.HOUSEHOLD_CLOUD_RUN_GATEWAY_PUBLIC_URL }}
          HOUSEHOLD_CLOUD_RUN_WORKER_SERVICE_ACCOUNT: ${{ vars.HOUSEHOLD_CLOUD_RUN_WORKER_SERVICE_ACCOUNT }}
          HOUSEHOLD_ANALYTICS_WRITER_URL: ${{ needs.deploy-analytics-staging.outputs.analytics_writer_url }}
          ANALYTICS__CLOUD_TASKS__PROJECT: ${{ vars.ANALYTICS_CLOUD_TASKS_PROJECT || env.GOOGLE_CLOUD_PROJECT }}
          ANALYTICS__CLOUD_TASKS__LOCATION: ${{ vars.ANALYTICS_CLOUD_TASKS_LOCATION || env.HOUSEHOLD_CLOUD_RUN_REGION }}
          ANALYTICS__CLOUD_TASKS__QUEUE: ${{ vars.ANALYTICS_CLOUD_TASKS_QUEUE }}
          ANALYTICS__CLOUD_TASKS__TARGET_URL: ${{ vars.ANALYTICS_CLOUD_TASKS_TARGET_URL }}
          ANALYTICS__CLOUD_TASKS__SERVICE_ACCOUNT_EMAIL: ${{ vars.ANALYTICS_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL }}
          ANALYTICS__CLOUD_TASKS__OIDC_AUDIENCE: ${{ vars.ANALYTICS_CLOUD_TASKS_OIDC_AUDIENCE }}
          ANALYTICS__CLOUD_TASKS__DISPATCH_DEADLINE_SECONDS: ${{ vars.ANALYTICS_CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS }}
        run: bash .github/scripts/cloud-run-deploy-failover.sh

  integration-tests-cloud-run-staging:
    name: Integration tests against Cloud Run staging (${{ matrix.channel }}, ${{ matrix.route_mode }})
    runs-on: ubuntu-latest
    needs: [deploy-cloud-run-staging]
    environment: staging
    env:
      HOUSEHOLD_API_BASE_URL: ${{ needs.deploy-cloud-run-staging.outputs.gateway_url }}
      HOUSEHOLD_API_EXPECTED_BACKEND: modal
      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        channel: [current, frontier]
        route_mode: [channel, exact]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Fetch Auth0 test token
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_SECRET }}
          AUTH0_TEST_TOKEN_SCOPES: ${{ secrets.AUTH0_TEST_TOKEN_SCOPES }}
        run: python .github/scripts/fetch_auth0_test_token.py

      - name: Warm Modal worker through the gateway
        # The Modal workers scale to zero shortly after a deploy, so the first
        # calculate routed through the gateway pays a cold start that can exceed
        # the gateway's Modal request timeout and 503. Warm the channel under
        # test first so the test step exercises a warm worker. Best-effort; the
        # test step remains the gate. See the script for details.
        run: bash .github/scripts/cloud-run-warm-modal-via-gateway.sh "${{ matrix.channel }}"

      - name: Run deployed integration tests for route
        run: |
          bash .github/scripts/run-deployed-tests-for-modal-route.sh \
            "${{ matrix.channel }}" \
            "${{ matrix.route_mode }}"

  integration-tests-cloud-run-fallback-staging:
    name: Forced Cloud Run fallback test against staging
    runs-on: ubuntu-latest
    needs: [deploy-cloud-run-staging, integration-tests-cloud-run-staging]
    environment: staging
    env:
      HOUSEHOLD_API_BASE_URL: ${{ needs.deploy-cloud-run-staging.outputs.gateway_url }}
      HOUSEHOLD_API_EXPECTED_BACKEND: cloud_run
      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      CLOUD_RUN_GATEWAY_SERVICE: ${{ vars.HOUSEHOLD_CLOUD_RUN_STAGING_GATEWAY_SERVICE || 'household-api-staging-gateway' }}
      HOUSEHOLD_CLOUD_RUN_WARM_TIMEOUT_SECONDS: "900"
      HOUSEHOLD_CLOUD_RUN_WARM_ATTEMPT_TIMEOUT_SECONDS: "240"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Fetch Auth0 test token
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_SECRET }}
          AUTH0_TEST_TOKEN_SCOPES: ${{ secrets.AUTH0_TEST_TOKEN_SCOPES }}
        run: python .github/scripts/fetch_auth0_test_token.py

      - name: Force Cloud Run fallback
        run: |
          gcloud run services update "${CLOUD_RUN_GATEWAY_SERVICE}" \
            --region "${HOUSEHOLD_CLOUD_RUN_REGION}" \
            --project "${GOOGLE_CLOUD_PROJECT}" \
            --update-env-vars HOUSEHOLD_FAILOVER_FORCE_BACKEND=cloud_run \
            --quiet

      - name: Warm Cloud Run fallback workers
        # Cold-start the min-instances=0 fallback workers before the test so it
        # doesn't time out waiting on the first request. Best-effort; the test
        # step is the gate. See the script for details.
        run: bash .github/scripts/cloud-run-warm-workers.sh

      - name: Run deployed fallback tests
        run: |
          status=0
          for channel in current frontier; do
            bash .github/scripts/run-deployed-tests-for-modal-route.sh \
              "${channel}" \
              channel || status=$?
          done
          exit "${status}"

      - name: Restore Modal-primary routing
        if: always()
        run: |
          gcloud run services update "${CLOUD_RUN_GATEWAY_SERVICE}" \
            --region "${HOUSEHOLD_CLOUD_RUN_REGION}" \
            --project "${GOOGLE_CLOUD_PROJECT}" \
            --remove-env-vars HOUSEHOLD_FAILOVER_FORCE_BACKEND \
            --quiet

  cleanup-modal-staging:
    name: Clean up retired Modal staging apps
    runs-on: ubuntu-latest
    needs: [deploy-cloud-run-staging]
    environment: staging
    permissions:
      contents: read
    env:
      MODAL_ENVIRONMENT: staging
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Download deferred Modal cleanup manifest
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: modal-cleanup-staging

      - name: Stop retired Modal apps
        run: |
          if [ -f modal-cleanup.json ]; then
            bash .github/scripts/modal-cleanup-apps.sh modal-cleanup.json
          else
            echo "No deferred Modal cleanup manifest; nothing to stop."
          fi

      - name: Prune cleaned apps from release manifest
        # Runs only after the stop step above succeeds, so a failed stop leaves
        # the retired entries in the manifest for retry on the next release.
        run: |
          if [ -f modal-cleanup.json ]; then
            uv run python -m policyengine_household_modal.prune_manifest \
              --cleanup-json modal-cleanup.json \
              --modal-environment "${MODAL_ENVIRONMENT}"
          else
            echo "No deferred Modal cleanup manifest; nothing to prune."
          fi

  migrate-analytics-db-production:
    name: Migrate analytics database (production)
    runs-on: ubuntu-latest
    needs:
      [
        resolve-modal-release-config,
        integration-tests-staging,
        integration-tests-cloud-run-staging,
        integration-tests-cloud-run-fallback-staging,
      ]
    # Root of the production subtree: every production job descends from this
    # one, so a staging-only dispatch skipping it skips all of production.
    if: |
      needs.resolve-modal-release-config.outputs.should_deploy == 'true' &&
      (
        github.event_name == 'push' ||
        inputs.deploy_scope != 'staging-only'
      )
    environment: production
    permissions:
      contents: read
    env:
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud for analytics database
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Run analytics database migrations
        run: uv run alembic -c projects/analytics-api/alembic.ini upgrade head

  deploy-analytics-production:
    name: Deploy Cloud Run analytics writer to production
    runs-on: ubuntu-latest
    needs: [migrate-analytics-db-production]
    environment: production
    permissions:
      contents: read
    outputs:
      analytics_writer_url: ${{ steps.deploy.outputs.analytics_writer_url }}
    env:
      MODAL_ENVIRONMENT: main
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Deploy Cloud Run analytics writer
        id: deploy
        env:
          APP__ENVIRONMENT: production
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED }}
          OBSERVABILITY_LOG_RAW_IP: ${{ vars.OBSERVABILITY_LOG_RAW_IP }}
          OBSERVABILITY_REQUEST_LOGS_ENABLED: ${{ vars.OBSERVABILITY_REQUEST_LOGS_ENABLED }}
          HOUSEHOLD_CLOUD_RUN_ANALYTICS_WRITER_SERVICE_ACCOUNT: ${{ vars.HOUSEHOLD_CLOUD_RUN_ANALYTICS_WRITER_SERVICE_ACCOUNT }}
        run: bash .github/scripts/cloud-run-deploy-analytics.sh

  deploy-modal-production:
    name: Deploy Modal release to production
    runs-on: ubuntu-latest
    needs: [resolve-modal-release-config, migrate-analytics-db-production]
    environment: production
    permissions:
      contents: read
    env:
      MODAL_ENVIRONMENT: main
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud for analytics database
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Deploy Modal app set
        id: deploy
        env:
          APP__ENVIRONMENT: production
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED }}
          OBSERVABILITY_LOG_RAW_IP: ${{ vars.OBSERVABILITY_LOG_RAW_IP }}
          OBSERVABILITY_REQUEST_LOGS_ENABLED: ${{ vars.OBSERVABILITY_REQUEST_LOGS_ENABLED }}
          AUTH__ENABLED: "true"
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
          ANALYTICS__CLOUD_TASKS__PROJECT: ${{ vars.ANALYTICS_CLOUD_TASKS_PROJECT || env.GOOGLE_CLOUD_PROJECT }}
          ANALYTICS__CLOUD_TASKS__LOCATION: ${{ vars.ANALYTICS_CLOUD_TASKS_LOCATION || env.HOUSEHOLD_CLOUD_RUN_REGION }}
          ANALYTICS__CLOUD_TASKS__QUEUE: ${{ vars.ANALYTICS_CLOUD_TASKS_QUEUE }}
          ANALYTICS__CLOUD_TASKS__TARGET_URL: ${{ vars.ANALYTICS_CLOUD_TASKS_TARGET_URL }}
          ANALYTICS__CLOUD_TASKS__SERVICE_ACCOUNT_EMAIL: ${{ vars.ANALYTICS_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL }}
          ANALYTICS__CLOUD_TASKS__OIDC_AUDIENCE: ${{ vars.ANALYTICS_CLOUD_TASKS_OIDC_AUDIENCE }}
          ANALYTICS__CLOUD_TASKS__DISPATCH_DEADLINE_SECONDS: ${{ vars.ANALYTICS_CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS }}
          # Defer stopping retired Modal apps until cleanup-modal-production
          # runs, after the Cloud Run failover manifest has been refreshed.
          # Otherwise the failover gateway would point `current` at a stopped
          # Modal app during the Cloud Run deploy window.
          HOUSEHOLD_DEFER_MODAL_CLEANUP: "true"
        run: |
          bash .github/scripts/modal-deploy-release.sh \
            '${{ needs.resolve-modal-release-config.outputs.config_json }}' \
            '${{ needs.resolve-modal-release-config.outputs.deploy_mode }}'

      - name: Upload deferred Modal cleanup manifest
        uses: actions/upload-artifact@v7
        with:
          name: modal-cleanup-production
          path: modal-cleanup.json
          if-no-files-found: ignore

  deploy-cloud-run-production:
    name: Deploy Cloud Run failover to production
    runs-on: ubuntu-latest
    needs: [deploy-modal-production, deploy-analytics-production]
    environment: production
    permissions:
      contents: read
    outputs:
      gateway_url: ${{ steps.deploy.outputs.gateway_url }}
      manifest_uri: ${{ steps.deploy.outputs.manifest_uri }}
    env:
      MODAL_ENVIRONMENT: main
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      ANALYTICS__ENABLED: "true"
      USER_ANALYTICS_DB_CONNECTION_NAME: ${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
      USER_ANALYTICS_DB_USERNAME: ${{ secrets.USER_ANALYTICS_DB_USERNAME }}
      USER_ANALYTICS_DB_PASSWORD: ${{ secrets.USER_ANALYTICS_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Deploy Cloud Run failover services
        id: deploy
        env:
          APP__ENVIRONMENT: production
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED }}
          OBSERVABILITY_LOG_RAW_IP: ${{ vars.OBSERVABILITY_LOG_RAW_IP }}
          OBSERVABILITY_REQUEST_LOGS_ENABLED: ${{ vars.OBSERVABILITY_REQUEST_LOGS_ENABLED }}
          AUTH__ENABLED: "true"
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          HOUSEHOLD_CLOUD_RUN_GATEWAY_SERVICE_ACCOUNT: ${{ vars.HOUSEHOLD_CLOUD_RUN_GATEWAY_SERVICE_ACCOUNT }}
          HOUSEHOLD_CLOUD_RUN_GATEWAY_INGRESS: ${{ vars.HOUSEHOLD_CLOUD_RUN_GATEWAY_INGRESS }}
          HOUSEHOLD_CLOUD_RUN_GATEWAY_PUBLIC_URL: ${{ vars.HOUSEHOLD_CLOUD_RUN_GATEWAY_PUBLIC_URL }}
          HOUSEHOLD_CLOUD_RUN_WORKER_SERVICE_ACCOUNT: ${{ vars.HOUSEHOLD_CLOUD_RUN_WORKER_SERVICE_ACCOUNT }}
          HOUSEHOLD_ANALYTICS_WRITER_URL: ${{ needs.deploy-analytics-production.outputs.analytics_writer_url }}
          ANALYTICS__CLOUD_TASKS__PROJECT: ${{ vars.ANALYTICS_CLOUD_TASKS_PROJECT || env.GOOGLE_CLOUD_PROJECT }}
          ANALYTICS__CLOUD_TASKS__LOCATION: ${{ vars.ANALYTICS_CLOUD_TASKS_LOCATION || env.HOUSEHOLD_CLOUD_RUN_REGION }}
          ANALYTICS__CLOUD_TASKS__QUEUE: ${{ vars.ANALYTICS_CLOUD_TASKS_QUEUE }}
          ANALYTICS__CLOUD_TASKS__TARGET_URL: ${{ vars.ANALYTICS_CLOUD_TASKS_TARGET_URL }}
          ANALYTICS__CLOUD_TASKS__SERVICE_ACCOUNT_EMAIL: ${{ vars.ANALYTICS_CLOUD_TASKS_SERVICE_ACCOUNT_EMAIL }}
          ANALYTICS__CLOUD_TASKS__OIDC_AUDIENCE: ${{ vars.ANALYTICS_CLOUD_TASKS_OIDC_AUDIENCE }}
          ANALYTICS__CLOUD_TASKS__DISPATCH_DEADLINE_SECONDS: ${{ vars.ANALYTICS_CLOUD_TASKS_DISPATCH_DEADLINE_SECONDS }}
        run: bash .github/scripts/cloud-run-deploy-failover.sh

  cleanup-modal-production:
    name: Clean up retired Modal production apps
    runs-on: ubuntu-latest
    needs: [deploy-cloud-run-production]
    environment: production
    permissions:
      contents: read
    env:
      MODAL_ENVIRONMENT: main
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Download deferred Modal cleanup manifest
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: modal-cleanup-production

      - name: Stop retired Modal apps
        run: |
          if [ -f modal-cleanup.json ]; then
            bash .github/scripts/modal-cleanup-apps.sh modal-cleanup.json
          else
            echo "No deferred Modal cleanup manifest; nothing to stop."
          fi

      - name: Prune cleaned apps from release manifest
        # Runs only after the stop step above succeeds, so a failed stop leaves
        # the retired entries in the manifest for retry on the next release.
        run: |
          if [ -f modal-cleanup.json ]; then
            uv run python -m policyengine_household_modal.prune_manifest \
              --cleanup-json modal-cleanup.json \
              --modal-environment "${MODAL_ENVIRONMENT}"
          else
            echo "No deferred Modal cleanup manifest; nothing to prune."
          fi

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event_name == 'push' &&
      github.event.head_commit.message == 'Update PolicyEngine Household API'
    needs: [deploy-cloud-run-production]
    environment:
      name: pypi
      url: https://pypi.org/p/policyengine-household-api
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Build package
        run: uv build --package policyengine-household-api

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  tag-release:
    name: Publish git tag
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event_name == 'push' &&
      github.event.head_commit.message == 'Update PolicyEngine Household API'
    needs: [publish]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Publish Git tag
        run: bash .github/publish-git-tag.sh
