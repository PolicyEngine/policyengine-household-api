name: Release via staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Deploy the same image to production after staging passes"
        required: false
        default: false
        type: boolean

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PROJECT_ID: policyengine-household-api
  REGION: us-central1
  IMAGE_NAME: us-central1-docker.pkg.dev/policyengine-household-api/policyengine-household-api/policyengine-household-api
  PYTHON_VERSION: "3.12"

concurrency:
  group: household-api-staged-deploy
  cancel-in-progress: false

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Install dependencies
        run: make install

      - name: Run Ruff format check
        run: make format-check

      - name: Run tests without auth
        run: make test

      - name: Run tests with auth
        run: make test-with-auth
        env:
          AUTH__ENABLED: true
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_TEST_TOKEN_NO_DOMAIN: ${{ secrets.AUTH0_TEST_TOKEN_NO_DOMAIN }}

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
      packages: write
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v2
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract deploy image metadata
        id: deploy-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=,suffix=

      - name: Extract GHCR image metadata
        id: ghcr-meta
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long,prefix=,suffix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gcp/policyengine_household_api/Dockerfile.production
          push: true
          tags: |
            ${{ steps.deploy-meta.outputs.tags }}
            ${{ steps.ghcr-meta.outputs.tags }}
          labels: ${{ steps.deploy-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was pushed
        env:
          GENERATED_TAGS: ${{ steps.deploy-meta.outputs.tags }}
        run: bash .github/scripts/verify-image-push.sh

      - name: Record image reference
        id: image
        run: echo "image_ref=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy to App Engine staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )
    environment: staging
    outputs:
      staging_url: ${{ steps.deploy.outputs.version_url }}
      staging_version_id: ${{ steps.deploy.outputs.version_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to staging
        id: deploy
        uses: google-github-actions/deploy-appengine@v3
        with:
          deliverables: "./gcp/policyengine_household_api/app.staging.yaml"
          image_url: ${{ needs.build-docker.outputs.image_ref }}
          promote: false
          flags: "--quiet"
          env_vars: |-
            APP__ENVIRONMENT=staging
            AUTH__ENABLED=true
            AUTH0_ADDRESS_NO_DOMAIN=${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
            AUTH0_AUDIENCE_NO_DOMAIN=${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
            ANALYTICS__ENABLED=false
            AI__ENABLED=false

      - name: Verify staging health
        run: bash .github/scripts/health-check.sh "${{ steps.deploy.outputs.version_url }}"

  integration-tests-staging:
    name: Integration tests against staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.5"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Fetch Auth0 test token
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_SECRET }}
        run: python .github/scripts/fetch_auth0_test_token.py

      - name: Run deployed integration tests
        env:
          HOUSEHOLD_API_BASE_URL: ${{ needs.deploy-staging.outputs.staging_url }}
        run: bash .github/scripts/run-deployed-tests.sh

  promote-staging:
    name: Promote staging version
    runs-on: ubuntu-latest
    needs: [deploy-staging, integration-tests-staging]
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event.head_commit.message == 'Update PolicyEngine Household API'
      )
    environment: staging

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Promote tested staging version
        env:
          SERVICE_NAME: staging
          VERSION: ${{ needs.deploy-staging.outputs.staging_version_id }}
        run: bash .github/scripts/set-traffic.sh

  cleanup-failed-staging:
    name: Clean up failed staging version
    runs-on: ubuntu-latest
    needs: [deploy-staging, integration-tests-staging]
    if: |
      always() &&
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      needs.deploy-staging.outputs.staging_version_id != '' &&
      (
        needs.deploy-staging.result == 'failure' ||
        needs.integration-tests-staging.result == 'failure'
      )
    environment: staging

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Delete failed staging version
        env:
          SERVICE_NAME: staging
          VERSION: ${{ needs.deploy-staging.outputs.staging_version_id }}
        run: bash .github/scripts/delete-appengine-version.sh

  deploy-production:
    name: Deploy to App Engine production
    runs-on: ubuntu-latest
    needs: [build-docker, promote-staging]
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      (
        (github.event_name == 'push' &&
         github.event.head_commit.message == 'Update PolicyEngine Household API') ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
      )
    environment: production
    outputs:
      production_url: ${{ steps.deploy.outputs.version_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to production
        id: deploy
        uses: google-github-actions/deploy-appengine@v3
        with:
          deliverables: "./gcp/policyengine_household_api/app.yaml"
          image_url: ${{ needs.build-docker.outputs.image_ref }}
          promote: true
          flags: "--quiet"
          env_vars: |-
            APP__ENVIRONMENT=production
            AUTH__ENABLED=true
            AUTH0_ADDRESS_NO_DOMAIN=${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
            AUTH0_AUDIENCE_NO_DOMAIN=${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
            ANALYTICS__ENABLED=true
            USER_ANALYTICS_DB_USERNAME=${{ secrets.USER_ANALYTICS_DB_USERNAME }}
            USER_ANALYTICS_DB_PASSWORD=${{ secrets.USER_ANALYTICS_DB_PASSWORD }}
            USER_ANALYTICS_DB_CONNECTION_NAME=${{ secrets.USER_ANALYTICS_DB_CONNECTION_NAME }}
            AI__ENABLED=true
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify production health
        run: bash .github/scripts/health-check.sh "${{ steps.deploy.outputs.version_url }}"

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event_name == 'push' &&
      github.event.head_commit.message == 'Update PolicyEngine Household API'
    needs: [deploy-production]
    environment:
      name: pypi
      url: https://pypi.org/p/policyengine-household-api
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.5"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  tag-release:
    name: Publish git tag
    runs-on: ubuntu-latest
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event_name == 'push' &&
      github.event.head_commit.message == 'Update PolicyEngine Household API'
    needs: [publish]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Publish Git tag
        run: bash .github/publish-git-tag.sh
