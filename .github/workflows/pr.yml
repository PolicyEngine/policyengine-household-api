name: Pull request

on: pull_request

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  PROJECT_ID: policyengine-household-api
  REGION: us-central1
  IMAGE_NAME: us-central1-docker.pkg.dev/policyengine-household-api/policyengine-household-api/policyengine-household-api
  PYTHON_VERSION: "3.12"
  PR_VALIDATION_SERVICE: pr-validation

concurrency:
  group: household-api-pr-validation
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Ruff
        run: pip install "ruff>=0.9.0"
      - name: Ruff format check
        run: ruff format --check .
  check-changelog:
    name: Check changelog fragment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog fragment exists
        run: bash .github/scripts/check-changelog-fragment.sh
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true
      - name: Install dependencies
        run: make install
      - name: Run tests without auth
        run: make test
      - name: Run tests with auth
        run: make test-with-auth
        env:
          AUTH__ENABLED: true
          AUTH0_ADDRESS_NO_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE_NO_DOMAIN: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_TEST_TOKEN_NO_DOMAIN: ${{ secrets.AUTH0_TEST_TOKEN_NO_DOMAIN }}

  build-docker:
    name: Build Docker image for PR validation
    runs-on: ubuntu-latest
    needs: [lint, check-changelog, test]
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v2
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: bash .github/scripts/build-and-push-image.sh

      - name: Verify image was pushed
        env:
          GENERATED_TAGS: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: bash .github/scripts/verify-image-push.sh

      - name: Record image reference
        id: image
        run: echo "image_ref=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy-pr-validation:
    name: Deploy to App Engine PR validation
    runs-on: ubuntu-latest
    needs: build-docker
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      pr_validation_url: ${{ steps.deploy.outputs.version_url }}
      pr_validation_version_id: ${{ steps.deploy.outputs.version_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to PR validation
        id: deploy
        uses: google-github-actions/deploy-appengine@v3
        with:
          deliverables: "./gcp/policyengine_household_api/app.pr-validation.yaml"
          image_url: ${{ needs.build-docker.outputs.image_ref }}
          promote: false
          flags: "--quiet"
          env_vars: |-
            APP__ENVIRONMENT=staging
            AUTH__ENABLED=true
            AUTH0_ADDRESS_NO_DOMAIN=${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
            AUTH0_AUDIENCE_NO_DOMAIN=${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
            ANALYTICS__ENABLED=false
            AI__ENABLED=false

      - name: Verify PR validation health
        run: bash .github/scripts/health-check.sh "${{ steps.deploy.outputs.version_url }}"

  integration-tests-pr-validation:
    name: Integration tests against PR validation
    runs-on: ubuntu-latest
    needs: deploy-pr-validation
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.5"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Fetch Auth0 test token
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_ADDRESS_NO_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE_NO_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_TEST_TOKEN_CLIENT_SECRET }}
        run: python .github/scripts/fetch_auth0_test_token.py

      - name: Run deployed integration tests
        env:
          HOUSEHOLD_API_BASE_URL: ${{ needs.deploy-pr-validation.outputs.pr_validation_url }}
        run: bash .github/scripts/run-deployed-tests.sh

  promote-pr-validation:
    name: Promote PR validation version
    runs-on: ubuntu-latest
    needs: [deploy-pr-validation, integration-tests-pr-validation]
    if: |
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Promote tested PR validation version
        env:
          SERVICE_NAME: ${{ env.PR_VALIDATION_SERVICE }}
          VERSION: ${{ needs.deploy-pr-validation.outputs.pr_validation_version_id }}
        run: bash .github/scripts/set-traffic.sh

  cleanup-failed-pr-validation:
    name: Clean up failed PR validation version
    runs-on: ubuntu-latest
    needs: [deploy-pr-validation, integration-tests-pr-validation]
    if: |
      always() &&
      github.repository == 'PolicyEngine/policyengine-household-api' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.deploy-pr-validation.outputs.pr_validation_version_id != '' &&
      (
        needs.deploy-pr-validation.result == 'failure' ||
        needs.integration-tests-pr-validation.result == 'failure'
      )

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Delete failed PR validation version
        env:
          SERVICE_NAME: ${{ env.PR_VALIDATION_SERVICE }}
          VERSION: ${{ needs.deploy-pr-validation.outputs.pr_validation_version_id }}
        run: bash .github/scripts/delete-appengine-version.sh
