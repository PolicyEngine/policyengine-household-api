site_name: PolicyEngine Household API
site_description: Partner integration guide for the PolicyEngine Household API.
site_url: https://policyengine.github.io/policyengine-household-api/
repo_url: https://github.com/PolicyEngine/policyengine-household-api
repo_name: PolicyEngine/policyengine-household-api
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Overview: index.md
  - Request format: request-format.md
  - Period keys: period-keys.md
  - Response format: response-format.md
  - Cookbook:
      - cookbook/index.md
      - "What's my client's SNAP for 2026?": cookbook/snap-annual.md
      - "When does my client lose SNAP this year?": cookbook/eligibility-cliff.md
  - Changelog: changelog.md
