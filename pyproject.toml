[project]
name = "policyengine-household-api"
version = "0.13.14"
description = "PolicyEngine Household API"
readme = "README.md"
authors = [
    { name = "PolicyEngine", email = "hello@policyengine.org" },
]
requires-python = ">=3.12"
dependencies = [
    "anthropic",
    "Authlib>=1.3.1,<1.7.0",
    "cloud-sql-python-connector",
    "flask>=2.2",
    "flask-cors>=3",
    "flask-sqlalchemy>=3",
    "google-cloud-logging",
    "google-cloud-storage",
    "gunicorn",
    "inflect",
    "policyengine_canada==0.96.3",
    "policyengine-ng==0.5.1",
    "policyengine-il==0.1.0",
    "policyengine_uk==2.31.0",
    "policyengine_us==1.626.1",
    "policyengine_core<=3.23.6",
    "pyjwt",
    "Flask-Caching==2.0.2",
    "urllib3<=1.26.20,>=1.21.1",
    "python-dotenv",
    "pymysql",
    "black==24.3.0",
    "Flask-Limiter",
    "pydantic",
]

[project.optional-dependencies]
dev = [
    "pytest-timeout",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["policyengine_household_api"]
