[project]
name = "policyengine-household-api"
version = "0.13.3"
description = "PolicyEngine Household API"
readme = "README.md"
authors = [
    { name = "PolicyEngine", email = "hello@policyengine.org" }
]
requires-python = ">=3.12"
dependencies = [
    "Authlib>=1.3.1",
    "Flask-Caching==2.0.2",
    "Flask-Limiter",
    "anthropic",
    "black==24.3.0",
    "cloud-sql-python-connector",
    "flask-cors>=3",
    "flask-sqlalchemy>=3",
    "flask>=2.2",
    "google-cloud-logging",
    "google-cloud-storage",
    "gunicorn",
    "inflect",
    "policyengine-il==0.1.0",
    "policyengine-ng==0.5.1",
    "policyengine_canada==0.96.3",
    "policyengine_uk==2.31.0",
    "policyengine_us==1.532.0",
    "pydantic",
    "pyjwt",
    "pymysql",
    "python-dotenv",
    "urllib3<1.27,>=1.21.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.optional-dependencies]
dev = [
    "build",
    "pytest",
    "pytest-timeout",
    "towncrier>=24.8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["policyengine_household_api"]

[tool.towncrier]
package = "policyengine_household_api"
directory = "changelog.d"
filename = "CHANGELOG.md"
title_format = "## [{version}] - {project_date}"
issue_format = ""
underlines = ["", "", ""]

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking changes"
showcontent = true

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true
